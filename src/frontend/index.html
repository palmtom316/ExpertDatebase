<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExpertDatebase 上线测试台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-layer bg-layer-a" aria-hidden="true"></div>
  <div class="bg-layer bg-layer-b" aria-hidden="true"></div>

  <header class="shell topbar">
    <div>
      <p class="top-eyebrow">ExpertDatebase</p>
      <h1>上线测试控制台</h1>
    </div>
    <div class="top-actions">
      <button id="upload-trigger" class="btn btn-primary" type="button">上传 PDF</button>
      <button id="start-eval-btn" class="btn btn-accent" type="button">启动评测</button>
    </div>
  </header>
  <input id="pdf-input" class="hidden-input" type="file" accept=".pdf,application/pdf">

  <main class="shell grid">
    <section class="card settings-card">
      <h2>API 配置</h2>
      <p class="hint">配置 MinerU 与 LLM API，保存后用于上传处理与评测调用。</p>
      <div class="settings-grid">
        <label>MinerU API Base
          <input id="mineru-api-base" placeholder="https://mineru.example.com">
        </label>
        <label>MinerU API Key
          <input id="mineru-api-key" type="password" placeholder="mineru-key">
        </label>
        <label>LLM Provider
          <select id="llm-provider">
            <option value="stub">stub</option>
            <option value="openai">openai</option>
            <option value="anthropic">anthropic</option>
          </select>
        </label>
        <label>LLM Model
          <input id="llm-model" placeholder="gpt-4o-mini">
        </label>
        <label>LLM API Base
          <input id="llm-base-url" placeholder="https://api.openai.com/v1">
        </label>
        <label>LLM API Key
          <input id="llm-api-key" type="password" placeholder="llm-key">
        </label>
      </div>
      <div class="settings-actions">
        <button id="save-settings-btn" class="btn btn-secondary" type="button">保存配置</button>
        <span id="settings-status">尚未保存</span>
      </div>
    </section>

    <section class="card quality-card">
      <h2>LLM 抽取质量评价</h2>
      <p class="hint">来自评测结果，显示总体得分与最近样本。</p>
      <div class="quality-metrics">
        <div><span>综合等级</span><strong id="quality-grade">-</strong></div>
        <div><span>综合分</span><strong id="quality-score">0</strong></div>
        <div><span>样本数</span><strong id="quality-count">0</strong></div>
      </div>
      <div class="quality-table-wrap">
        <table class="quality-table">
          <thead>
            <tr><th>sample_id</th><th>provider/model</th><th>score</th><th>时间</th></tr>
          </thead>
          <tbody id="quality-table-body"></tbody>
        </table>
      </div>
    </section>

    <section class="card upload-card" aria-live="polite">
      <h2>上传状态</h2>
      <p id="upload-message" class="status-message">等待上传 PDF。</p>
      <div class="meta-grid">
        <p><b>doc_id</b> <span id="upload-doc-id">-</span></p>
        <p><b>version_id</b> <span id="upload-version-id">-</span></p>
        <p><b>object_key</b> <span id="upload-object-key">-</span></p>
        <p><b>状态</b> <span id="upload-version-status">-</span></p>
      </div>
    </section>

    <section class="card docs-card">
      <div class="docs-head">
        <h2>文档列表</h2>
        <button id="retry-failed-btn" class="btn btn-secondary" type="button">重试失败任务</button>
      </div>
      <div class="toolbar">
        <input id="search-input" placeholder="按文档名或ID检索">
        <div class="chips">
          <button class="chip is-active" data-filter="all" type="button">全部</button>
          <button class="chip" data-filter="indexed" type="button">已索引</button>
          <button class="chip" data-filter="processing" type="button">处理中</button>
          <button class="chip" data-filter="review" type="button">失败/复核</button>
        </div>
      </div>
      <p id="result-count" class="hint">0 条结果</p>
      <ul class="doc-list"></ul>
    </section>

    <section class="card review-card">
      <h2>证据 Review</h2>
      <p id="review-title" class="hint">点击“查看证据”后显示定位内容</p>
      <ul id="review-evidence-list" class="evidence-list"></ul>
    </section>

    <section class="card chat-card">
      <h2>LLM 问答调试</h2>
      <div class="chat-row">
        <input id="chat-question" placeholder="输入问题，例如：合同金额是多少？">
        <button id="chat-send-btn" class="btn btn-primary" type="button">发送</button>
      </div>
      <pre id="chat-answer" class="chat-answer">-</pre>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
