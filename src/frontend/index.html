<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ExpertDatebase 控制台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="ambient-shape ambient-shape--a" aria-hidden="true"></div>
  <div class="ambient-shape ambient-shape--b" aria-hidden="true"></div>

  <header class="panel topbar">
    <div class="brand">
      <p class="eyebrow">ExpertDatebase</p>
      <h1>文档检索控制台</h1>
    </div>
    <div class="topbar-actions">
      <button id="upload-trigger" class="btn-jelly btn-secondary" type="button">上传文档</button>
      <button id="start-eval-btn" class="btn-jelly btn-primary" type="button">新建评测</button>
    </div>
  </header>
  <input id="pdf-input" class="hidden-input" type="file" accept=".pdf,application/pdf">

  <main class="layout">
    <section class="panel query-panel">
      <h2>检索与过滤</h2>
      <p class="subtitle">文档列表来自后端 API，状态实时同步。</p>

      <label class="input-label" for="search-input">搜索关键词</label>
      <div class="query-row">
        <input id="search-input" class="query-input" type="search" placeholder="输入文档名、章节或关键短语">
        <button id="search-btn" class="btn-jelly btn-primary" type="button">开始检索</button>
      </div>

      <div class="filters" role="toolbar" aria-label="状态筛选">
        <button class="filter-chip is-active" data-filter="all" aria-pressed="true" type="button">全部</button>
        <button class="filter-chip" data-filter="indexed" aria-pressed="false" type="button">已索引</button>
        <button class="filter-chip" data-filter="processing" aria-pressed="false" type="button">处理中</button>
        <button class="filter-chip" data-filter="review" aria-pressed="false" type="button">需复核</button>
      </div>

      <p id="result-count" class="result-count">0 条结果</p>
    </section>

    <section class="panel upload-panel" aria-live="polite">
      <h2>上传与抽取状态</h2>
      <p class="subtitle">上传 PDF 后将自动入队，Worker 会开始抽取与索引。</p>
      <p id="upload-message" class="upload-message">等待上传 PDF 文件。</p>
      <div class="upload-meta-grid">
        <p><strong>doc_id:</strong> <span id="upload-doc-id">-</span></p>
        <p><strong>version_id:</strong> <span id="upload-version-id">-</span></p>
        <p><strong>object_key:</strong> <span id="upload-object-key">-</span></p>
        <p><strong>状态:</strong> <span id="upload-version-status">-</span></p>
      </div>
    </section>

    <section class="metrics">
      <article class="panel metric-card">
        <p class="metric-label">评测失败率</p>
        <p id="trend-failure-rate" class="metric-value">0%</p>
      </article>
      <article class="panel metric-card">
        <p class="metric-label">质量均分</p>
        <p id="trend-quality-score" class="metric-value">0</p>
      </article>
      <article class="panel metric-card">
        <p class="metric-label">结果总数</p>
        <p id="trend-total-results" class="metric-value">0</p>
      </article>
    </section>

    <section class="panel docs-panel">
      <div class="docs-header">
        <h2>文档列表</h2>
        <button id="retry-failed-btn" class="btn-jelly btn-secondary" type="button">批量重试失败任务</button>
      </div>
      <ul class="doc-list"></ul>
    </section>

    <section class="panel review-panel">
      <h2>Review 证据面板</h2>
      <p class="subtitle">支持 PDF 页码定位、证据摘录与一键加入评测集。</p>
      <p id="review-title" class="review-title">尚未选择文档</p>
      <ul id="review-evidence-list" class="review-evidence-list"></ul>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
