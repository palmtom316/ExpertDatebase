services:
  api-server:
    build:
      context: ..
      dockerfile: services/api-server/Dockerfile
    image: expertkb/api-server:dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/expertkb
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_NAME=document:process
      - OBJECT_STORAGE_BACKEND=auto
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_BUCKET=expertkb
      - VECTORDB_ENDPOINT=http://qdrant:6333
      - QDRANT_COLLECTION=chunks_v1
      - QDRANT_VECTOR_NAME=text_embedding
      - DOC_REGISTRY_BACKEND=auto
      - TASK_QUEUE_BACKEND=auto
      - SEARCH_REPO_BACKEND=auto
      - CONFIG_DIR=/configs
    volumes:
      - ../shared/configs:/configs:ro
      - objectdata:/data/objects
    ports:
      - "8080:8080"
    depends_on: [postgres, redis, minio, qdrant]

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    image: expertkb/worker:dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/expertkb
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_NAME=document:process
      - OBJECT_STORAGE_BACKEND=auto
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_BUCKET=expertkb
      - VECTORDB_ENDPOINT=http://qdrant:6333
      - QDRANT_COLLECTION=chunks_v1
      - QDRANT_VECTOR_NAME=text_embedding
      - VECTORDB_BACKEND=auto
      - DOC_REGISTRY_PATH=.runtime/registry.json
      - TASK_QUEUE_BACKEND=auto
      - CONFIG_DIR=/configs
    volumes:
      - ../shared/configs:/configs:ro
      - objectdata:/data/objects
    depends_on: [postgres, redis, minio, qdrant]

  web-ui:
    image: expertkb/web-ui:latest
    profiles: ["ui"]
    ports:
      - "80:80"
    depends_on: [api-server]

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=expertkb
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    volumes:
      - miniodata:/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata:
  objectdata:
  miniodata:
