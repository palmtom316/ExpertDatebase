services:
  api-server:
    build:
      context: ..
      dockerfile: services/api-server/Dockerfile
    image: expertkb/api-server:dev
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/expertkb
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_NAME=document:process
      - OBJECT_STORAGE_BACKEND=auto
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=expertkb
      - VECTORDB_ENDPOINT=http://qdrant:6333
      - QDRANT_COLLECTION=chunks_v1
      - QDRANT_VECTOR_NAME=text_embedding
      - DOC_REGISTRY_BACKEND=auto
      - TASK_QUEUE_BACKEND=auto
      - SEARCH_REPO_BACKEND=auto
      - CONFIG_DIR=/configs
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_TOKENS_JSON={"LOCAL_DEV_ADMIN_TOKEN":"system_admin","LOCAL_DEV_ENGINEER_TOKEN":"bid_engineer"}
      - UPLOAD_MAX_MB=${UPLOAD_MAX_MB:-50}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - LLM_HTTP_TIMEOUT_S=${LLM_HTTP_TIMEOUT_S:-30}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE:-0.2}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      - ANTHROPIC_VERSION=${ANTHROPIC_VERSION:-2023-06-01}
      - ANTHROPIC_MAX_TOKENS=${ANTHROPIC_MAX_TOKENS:-1024}
    volumes:
      - ../shared/configs:/configs:ro
      - objectdata:/data/objects
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    image: expertkb/worker:dev
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/expertkb
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_NAME=document:process
      - OBJECT_STORAGE_BACKEND=auto
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=expertkb
      - VECTORDB_ENDPOINT=http://qdrant:6333
      - QDRANT_COLLECTION=chunks_v1
      - QDRANT_VECTOR_NAME=text_embedding
      - VECTORDB_BACKEND=auto
      - DOC_REGISTRY_PATH=.runtime/registry.json
      - TASK_QUEUE_BACKEND=auto
      - CONFIG_DIR=/configs
    volumes:
      - ../shared/configs:/configs:ro
      - objectdata:/data/objects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis,os; r=redis.from_url(os.getenv('REDIS_URL','redis://redis:6379/0')); r.ping()"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: ..
      dockerfile: services/scheduler/Dockerfile
    image: expertkb/scheduler:dev
    environment:
      - SCHEDULER_API_BASE=http://api-server:8080
      - SCHEDULER_EXPIRY_INTERVAL_S=${SCHEDULER_EXPIRY_INTERVAL_S:-300}
      - SCHEDULER_EVAL_INTERVAL_S=${SCHEDULER_EVAL_INTERVAL_S:-900}
    depends_on:
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://api-server:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: src/frontend/Dockerfile
    image: expertkb/frontend:dev
    profiles: ["ui"]
    ports:
      - "5500:80"
    depends_on: [api-server]

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=expertkb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expertkb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ulimits:
      nofile:
        soft: ${QDRANT_NOFILE_SOFT:-65535}
        hard: ${QDRANT_NOFILE_HARD:-65535}
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "pidof qdrant >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  qdrantdata:
  objectdata:
  miniodata:
